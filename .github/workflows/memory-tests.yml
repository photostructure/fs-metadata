name: Memory Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Cross-platform memory testing using the central orchestrator script
  memory-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
        node-version: [22, 24, 26]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libblkid-dev uuid-dev build-essential valgrind clang

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build native and javascript bundle
        run: npm run build

      - name: Run comprehensive memory tests
        run: npm run check:memory
        env:
          CI: "true"

      - name: Upload memory test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: memory-test-results-${{ matrix.os }}-node${{ matrix.node-version }}
          path: |
            *.log
            valgrind-*.log
            asan-output.log
            core.*
            test-results/
          retention-days: 7
