name: Memory Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Cross-platform memory testing using the central orchestrator script
  memory-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
        node-version: [22, 24, 26]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libblkid-dev uuid-dev build-essential valgrind clang

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build native and javascript bundle
        run: npm run build

      - name: Run comprehensive memory tests
        run: npm run check:memory
        env:
          CI: "true"

      - name: Upload memory test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: memory-test-results-${{ matrix.os }}-node${{ matrix.node-version }}
          path: |
            *.log
            valgrind-*.log
            asan-output.log
            core.*
            test-results/
          retention-days: 7

  # ThreadSanitizer is EXCLUSIVE with AddressSanitizer -- they cannot share a
  # binary -- so it gets its own job rather than folding into check:memory.
  #
  # It runs a dedicated concurrency stress harness rather than the Jest suite:
  # TSan's LD_PRELOAD is inherited by child processes, and the debuglog tests
  # spawn child `node` processes whose stdout the sanitizer corrupts. See
  # src/test-utils/tsan-stress.ts.
  #
  thread-sanitizer:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - run: |
          sudo apt-get update
          sudo apt-get install -y libblkid-dev uuid-dev build-essential clang

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Keep this aligned with the stock-Node version used to derive the
          # function-specific suppressions in .tsan-suppressions.txt.
          node-version: 26

      - run: npm ci

      - name: Run ThreadSanitizer
        run: npm run check:tsan
        env:
          CI: "true"

      - name: Upload ThreadSanitizer output
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tsan-results-${{ matrix.arch }}
          path: tsan-output.log
          retention-days: 7
